spring.application.name=Smart Campus Events

# H2 file DB — path on disk is ./data/ (see spring.datasource.url). Not shown on public web pages.
spring.datasource.url=jdbc:h2:file:./data/campus-events;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.thymeleaf.cache=false

server.port=8081

app.college.name=Veltech University

# Only these four faculty login IDs may use the faculty portal (must match seeded accounts in DataLoader).
app.faculty.allowed-login-ids=VTUF001,VTUF002,VTUF003,VTUF004
