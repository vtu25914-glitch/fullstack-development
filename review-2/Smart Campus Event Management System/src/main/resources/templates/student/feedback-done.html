<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{_fragments :: head('Feedback')}"></head>
<body>
<div class="page-bg" aria-hidden="true"></div>
<header th:replace="~{_fragments :: navbar('regs')}"></header>

<main class="container section">
  <div class="panel">
    <h2 style="font-family: Syne, system-ui; margin:0 0 8px;">Feedback</h2>
    <p class="muted" th:if="${existing != null}">You already submitted feedback for this registration.</p>
    <div class="panel" style="margin-top:12px;" th:if="${existing != null}">
      <div class="pill" th:text="'Rating: ' + ${existing.rating} + ' / 5'">Rating</div>
      <p class="muted" style="margin-top:10px; white-space: pre-wrap;" th:text="${existing.comment}">comment</p>
    </div>
    <div class="row-actions" style="margin-top:14px;">
      <a class="btn btn-primary" th:href="@{/student/registrations}">Back to my list</a>
    </div>
  </div>
</main>

<div th:replace="~{_fragments :: fab}"></div>
<footer th:replace="~{_fragments :: footer}"></footer>
</body>
</html>
