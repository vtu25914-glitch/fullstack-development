<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{_fragments :: head('Student home')}"></head>
<body>
<div class="page-bg" aria-hidden="true"></div>
<header th:replace="~{_fragments :: navbar('student')}"></header>

<main class="container section">
  <div class="section-head">
    <div>
      <p class="eyebrow">Veltech University</p>
      <h1 class="page-title">Welcome</h1>
      <p class="lead muted">Signed in as <span class="mono" th:text="${user.username}">VTU</span></p>
    </div>
  </div>

  <div class="tile-grid">
    <a class="tile" th:href="@{/events}">
      <h3>Browse events</h3>
      <p class="muted">View upcoming workshops, seminars, and campus activities.</p>
      <span class="tile-cta">Open</span>
    </a>
    <a class="tile" th:href="@{/student/registrations}">
      <h3>My registrations</h3>
      <p class="muted">Review your sign-ups and submit feedback after events.</p>
      <span class="tile-cta">Open</span>
    </a>
  </div>
</main>

<div th:replace="~{_fragments :: fab}"></div>
<footer th:replace="~{_fragments :: footer}"></footer>
</body>
</html>
