<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{_fragments :: head('Student registration · Veltech')}"></head>
<body>
<div class="page-bg" aria-hidden="true"></div>
<header th:replace="~{_fragments :: navbar('login-stu')}"></header>

<main class="container section narrow">
  <div th:if="${infoMessage}" class="flash" th:text="${infoMessage}"></div>

  <div class="auth-card auth-card-muted">
    <p class="eyebrow">Veltech University</p>
    <h1 class="page-title">Student registration</h1>
    <p class="muted">Create an account with your official ID: <span class="mono">VTU</span> followed by exactly five digits.</p>

    <div th:if="${signupError}" class="error banner" th:text="${signupError}"></div>
    <div th:if="${passwordMismatch}" class="error banner" th:text="${passwordMismatch}"></div>

    <form class="stack-form" method="post" th:action="@{/register/student}" th:object="${form}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div>
        <label for="fullName">Full name</label>
        <input id="fullName" th:field="*{fullName}" autocomplete="name" required/>
        <p class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
      </div>
      <div>
        <label for="loginId">University ID</label>
        <input id="loginId" th:field="*{loginId}" autocomplete="username" placeholder="VTU12345" maxlength="8"
               pattern="[Vv][Tt][Uu][0-9]{5}" required/>
        <p class="field-error" th:if="${#fields.hasErrors('loginId')}" th:errors="*{loginId}"></p>
      </div>
      <div>
        <label for="password">Password (min 8 characters)</label>
        <input id="password" type="password" th:field="*{password}" autocomplete="new-password" required minlength="8"/>
        <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
      </div>
      <div>
        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" type="password" th:field="*{confirmPassword}" autocomplete="new-password" required minlength="8"/>
        <p class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
      </div>
      <button class="btn btn-primary btn-block" type="submit">Create account</button>
    </form>

    <p class="muted small" style="margin-top:18px;">Already registered? <a th:href="@{/login/student}">Student login</a></p>
  </div>
</main>

<div th:replace="~{_fragments :: fab}"></div>
<footer th:replace="~{_fragments :: footer}"></footer>
</body>
</html>
