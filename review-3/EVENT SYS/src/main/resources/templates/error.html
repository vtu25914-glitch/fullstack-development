<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error - Campus Events</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
<div style="text-align:center;max-width:500px;padding:2rem;">
    <div style="font-size:5rem;margin-bottom:1rem;">😕</div>
    <h1 style="font-size:2rem;font-weight:800;margin-bottom:0.5rem;" th:text="${errorTitle} ?: 'Oops!'">Error</h1>
    <p style="color:var(--text-muted);margin-bottom:2rem;" th:text="${errorMessage} ?: 'Something went wrong.'">Error message</p>
    <a th:href="@{/}" class="btn btn-primary">← Back to Home</a>
</div>
</body>
</html>
