<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Statistics - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="admin-sidebar-brand">🎓 Admin Panel</div>
        <a th:href="@{/admin/dashboard}" class="admin-nav-item">📊 Dashboard</a>
        <a th:href="@{/admin/events}" class="admin-nav-item">📋 Events</a>
        <a th:href="@{/admin/events/new}" class="admin-nav-item">➕ Add Event</a>
        <a th:href="@{/admin/stats}" class="admin-nav-item active">📈 Statistics</a>
        <div style="flex:1"></div>
        <a th:href="@{/}" class="admin-nav-item">🏠 Public Site</a>
        <form th:action="@{/admin/logout}" method="post">
            <button type="submit" class="admin-nav-item" style="border:none;cursor:pointer;background:none;width:100%;text-align:left;color:var(--danger);">🚪 Logout</button>
        </form>
    </aside>
    <main class="admin-content">
        <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:2rem;">📈 Event Statistics</h1>

        <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));">
            <div class="stat-card">
                <div class="stat-card-icon">📅</div>
                <div class="stat-card-value" th:text="${#lists.size(events)}">0</div>
                <div class="stat-card-label">Total Events</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon">👥</div>
                <div class="stat-card-value" th:text="${totalRegistrations}">0</div>
                <div class="stat-card-label">Total Registrations</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon">⭐</div>
                <div class="stat-card-value" th:text="${#numbers.formatDecimal(overallRating,1,1)}">0.0</div>
                <div class="stat-card-label">Avg. Rating</div>
            </div>
        </div>

        <!-- Per-Event Stats Table -->
        <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:16px;overflow:hidden;">
            <div style="padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);">
                <h3 style="font-weight:700;">Per-Event Statistics</h3>
            </div>
            <div style="overflow-x:auto;">
                <table class="admin-table">
                    <thead><tr>
                        <th>Event</th><th>Type</th><th>Date</th><th>Dept</th>
                        <th>Registered</th><th>Capacity</th><th>Fill %</th><th>Status</th>
                    </tr></thead>
                    <tbody>
                    <tr th:each="event : ${events}">
                        <td style="font-weight:600;max-width:200px;" th:text="${event.title}">Title</td>
                        <td><span class="event-type-badge badge-workshop" th:text="${event.type}">Type</span></td>
                        <td style="font-size:.82rem;" th:text="${#temporals.format(event.date,'dd MMM yyyy')}">Date</td>
                        <td style="font-size:.82rem;" th:text="${event.department}">Dept</td>
                        <td style="font-weight:600;color:var(--accent);" th:text="${event.registrationCount}">0</td>
                        <td th:text="${event.capacity}">100</td>
                        <td>
                            <div style="display:flex;align-items:center;gap:.5rem;">
                                <div class="capacity-bar" style="width:60px;">
                                    <div class="capacity-fill"
                                         th:style="'width:' + ${event.capacity > 0 ? (event.registrationCount * 100 / event.capacity) : 0} + '%'"></div>
                                </div>
                                <span style="font-size:.78rem;color:var(--text-muted);"
                                      th:text="${event.capacity > 0 ? #numbers.formatDecimal(event.registrationCount * 100.0 / event.capacity, 1, 0) : 0} + '%'">0%</span>
                            </div>
                        </td>
                        <td>
                            <span th:text="${event.status}"
                                  th:style="${event.status == 'UPCOMING'} ? 'color:var(--info)' : (${event.status == 'COMPLETED'} ? 'color:var(--success)' : 'color:var(--danger)')"
                                  style="font-size:.8rem;font-weight:600;">UPCOMING</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
</body>
</html>
