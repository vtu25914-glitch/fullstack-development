# =========================================
# Smart Campus Event Management System
# Application Configuration
# =========================================

spring.application.name=Smart Campus Event Management

# =========================================
# H2 Database Configuration
# =========================================
spring.datasource.url=jdbc:h2:mem:eventdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =========================================
# Email Configuration (OTP Sending)
# Update with your Gmail credentials
# =========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# ↓↓↓ REPLACE THESE TWO VALUES with your real Gmail credentials ↓↓↓
spring.mail.username=vtu25914@veltech.edu.in
spring.mail.password=kkmd srxi wvxi rbdn
# ↑↑↑ Use a Gmail App Password (16 chars), NOT your regular Gmail password ↑↑↑
spring.mail.from=${spring.mail.username}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# =========================================
# Thymeleaf Configuration
# =========================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =========================================
# Server Configuration
# =========================================
server.port=8088

# =========================================
# Logging
# =========================================
logging.level.com.campus=DEBUG
logging.level.org.springframework.security=DEBUG
