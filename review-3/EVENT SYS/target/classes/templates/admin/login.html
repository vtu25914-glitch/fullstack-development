<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Login - Campus Events</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--dark);">
<div class="form-card" style="width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:1.5rem;">
        <div style="font-size:3rem;margin-bottom:0.5rem;">🔐</div>
        <div class="form-title">Admin Login</div>
        <div class="form-subtitle">Sign in to manage campus events</div>
    </div>

    <div class="alert alert-danger" th:if="${param.error}">❌ Invalid credentials. Please try again.</div>
    <div class="alert alert-success" th:if="${param.logout}">✅ Logged out successfully.</div>

    <form th:action="@{/admin/login}" method="post">
        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="admin" required/>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">Sign In →</button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;">
        <a th:href="@{/}" style="color:var(--text-muted);font-size:0.85rem;text-decoration:none;">← Back to Home</a>
    </div>
    <div style="text-align:center;margin-top:1rem;padding:0.8rem;background:rgba(108,99,255,0.08);border-radius:8px;font-size:0.8rem;color:var(--text-muted);">
        Demo: <strong style="color:var(--primary)">admin</strong> / <strong style="color:var(--primary)">admin123</strong>
    </div>
</div>
</body>
</html>
